; InsightsTrackOrder - Customize the order of tracks in Unreal Insights Timing View
;
; Tracks listed here will appear first (top-most) in the Timing View,
; in the order they are listed. All other tracks will appear below,
; in their default order.
;
; Matching is by substring: "GPU" will match "GPU", "GPU2", "GPU Queue 0", etc.
; For exact matching, use the full track name (e.g. "GameThread").
;
; Uncomment and customize the lines below:

[InsightsTrackOrder]
+PriorityTracks=RHIFrameFlipThread
+PriorityTracks=AgcViewportThread
+PriorityTracks=GameThread
+PriorityTracks=RenderThread 0
+PriorityTracks=RHIThread
+PriorityTracks=RHISubmissionThread
+PriorityTracks=GPU
+PriorityTracks=GPU0-Graphics0
+PriorityTracks=GPU0-Copy0
+PriorityTracks=GPU0-Compute0
+PriorityTracks=RHIInterruptThread
